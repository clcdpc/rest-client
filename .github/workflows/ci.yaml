name: ci

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-test-pack:
    name: build, test, pack
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore tests/Clc.Rest.Client.Tests/Clc.Rest.Client.Tests.csproj

      - name: Build package project
        run: dotnet build src/Clc.Rest.Client.csproj --configuration Release --no-restore -warnaserror

      - name: Build tests
        run: dotnet build tests/Clc.Rest.Client.Tests/Clc.Rest.Client.Tests.csproj --configuration Release --no-restore -warnaserror

      - name: Test
        run: dotnet test tests/Clc.Rest.Client.Tests/Clc.Rest.Client.Tests.csproj --configuration Release --no-build --logger trx --results-directory TestResults

      - name: Check for blocked sync-over-async patterns
        shell: bash
        run: |
          if git grep -n -E '\.Result|\.Wait\(|GetAwaiter\(\)\.GetResult\(|ReadContentSynchronously|ReadBodySynchronously|Execute<T>' -- 'src/**/*.cs'; then
            echo "Blocked sync-over-async or removed execution pattern found in src/."
            exit 1
          fi

          echo "No blocked sync-over-async or removed execution patterns found in src/."

      - name: Pack
        run: dotnet pack src/Clc.Rest.Client.csproj --configuration Release --no-build --output artifacts/packages

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/*.trx

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          if-no-files-found: error
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg